services:
  nginx:
    image: nginx:latest
    container_name: conecta_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_data:/var/www/media:ro
    ports:
      - "80:80"
    depends_on:
      - api
      - ui
    networks:
      - network
  ui:
    build: ./ui
    container_name: conecta_ui
    restart: always
    environment:
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      - PORT=3000
    ports:
      - "3000"
    depends_on:
      api:
        condition: service_started
    networks:
      - network
  api:
    build: ./api
    container_name: conecta_api
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_started
      redis:
        condition: service_started
    environment:
        - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/conecta_postgres
        - SPRING_DATASOURCE_USERNAME=admin
        - SPRING_DATASOURCE_PASSWORD=admin
        - SPRING_DATA_MONGODB_UUID_REPRESENTATION=standard
        - MONGO_HOST=mongodb
        - SPRING_DATA_REDIS_HOST=redis
        - SPRING_DATA_REDIS_PORT=6379
        - MAIL_USERNAME=${MAIL_USERNAME}
        - MAIL_PASSWORD=${MAIL_PASSWORD}
    networks:
      - network
    volumes:
      - media_data:/var/www/media 
  postgres:
    image: postgres:latest
    container_name: conecta_postgres
    ports:
      - "5432"
    environment:
      - POSTGRES_DB=conecta_postgres
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d conecta_postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - network
    volumes:
      - postgres_data:/var/lib/postgresql
  mongodb:
    image: mongo:latest
    container_name: conecta_mongo
    ports:
      - "27017"
    restart: always
    networks:
      - network
    volumes:
      - mongo_data:/data/db
  redis:
    image: redis:latest
    container_name: conecta_cache
    ports:
      - "6379"
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - network
  prometheus:
    image: prom/prometheus:latest
    container_name: conecta_prometheus
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - network

  grafana:
    image: grafana/grafana:latest
    container_name: conecta_grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - network
    depends_on:
      - prometheus    
networks:
  network:
    driver: bridge
volumes:
  postgres_data:
  mongo_data:
  redis_data:
  media_data: