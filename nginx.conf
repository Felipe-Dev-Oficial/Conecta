server {
    listen 80;
    server_name _;

    # ── Arquivos de mídia servidos estaticamente ──────────────────────────────
    location /media/ {
        alias /var/www/media/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";

        # Limite de tamanho de arquivo (ajuste conforme necessário)
        client_max_body_size 50M;
    }

    # ── API Spring Boot ───────────────────────────────────────────────────────
    location /conecta/ {
        proxy_pass          http://api:8080/conecta/;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    Authorization     $http_authorization;
        proxy_pass_header   Authorization;

        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # Permite upload de arquivos grandes via API
        client_max_body_size 50M;
    }

    # ── Frontend Angular ─────────────────────────────────────────────────
    location ~* \.webmanifest$ {
        proxy_pass http://ui:3000;
        add_header Content-Type application/manifest+json;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Configuração para o Service Worker 
    location ~* /(ngsw-worker\.js|ngsw\.json)$ {
        proxy_pass http://ui:3000;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    location / {
        proxy_pass          http://ui:3000;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        "upgrade";

        proxy_connect_timeout 5s;
        proxy_send_timeout    15s;
        proxy_read_timeout    15s;
    }
}