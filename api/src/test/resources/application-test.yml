spring:
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: jdbc:tc:postgresql:16-alpine:///conecta_db
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  data:
    mongodb:
      auto-index-creation: true
    redis:
      host: localhost
      port: 6379
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  cache:
    type: redis

api:
  security:
    token:
      secret: "uma-secret-muito-longa-e-segura-para-os-testes-de-integracao-123"

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: conecta-api