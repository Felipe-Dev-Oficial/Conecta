server {
    listen 80;
    server_name _;

    # ── Assets estáticos do Angular build (browser) ──────────────────────────
    # O Angular SSR serve o HTML dinamicamente, mas assets JS/CSS/fontes
    # podem ser servidos diretamente pelo nginx para melhor performance.
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webmanifest|map)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── Proxy para o backend Spring Boot ─────────────────────────────────────
    # CORREÇÃO: era /connecta/ (typo), o endpoint real é /conecta/
    location /conecta/ {
        proxy_pass          http://api:8080/conecta/;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    Authorization     $http_authorization;
        proxy_pass_header   Authorization;

        # Timeouts adequados para operações mais longas (upload lote, etc.)
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # ── SSR Angular (tudo que não é asset ou /conecta/) ──────────────────────
    # O servidor Node/Express do Angular SSR cuida do roteamento e prerender.
    location / {
        proxy_pass          http://ui:3000;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        "upgrade";

        proxy_connect_timeout 5s;
        proxy_send_timeout    15s;
        proxy_read_timeout    15s;
    }
}