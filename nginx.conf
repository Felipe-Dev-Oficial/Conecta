server {
    listen 80;

    # Frontend Angular (arquivos estáticos gerados pelo build)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;  # necessário pro Angular router

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webmanifest)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Proxy pro backend Spring
    location /connecta/ {
        proxy_pass         http://app:8080/connecta/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization     $http_authorization;
        proxy_pass_header  Authorization;
    }
}