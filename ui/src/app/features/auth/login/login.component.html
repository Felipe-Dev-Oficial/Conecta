<div class="login-page">
  <button class="theme-toggle" (click)="theme.toggle()">
    {{ theme.theme() === 'dark' ? '☀️' : '🌙' }}
  </button>

  <div class="login-card">
    <div class="login-brand">
      <div class="brand-mark">
        <img src="icons/appicon.png" alt="Conecta" style="width:32px;height:32px;object-fit:contain;" />
      </div>
      <h1 class="brand-name">CONECTA</h1>
      <p class="brand-sub">Sistema Escolar</p>
    </div>

    <form class="login-form" (ngSubmit)="submit()">
      <div class="field">
        <label for="rm">RM / Matrícula</label>
        <input id="rm" class="input" type="text" placeholder="Digite seu RM"
          [(ngModel)]="rm" name="rm" autocomplete="username" required />
      </div>

      <div class="field">
        <label for="senha">Senha</label>
        <div class="input-wrap">
          <input id="senha" class="input" [type]="showPwd() ? 'text' : 'password'"
            placeholder="••••••••" [(ngModel)]="senha" name="senha"
            autocomplete="current-password" required />
          <button type="button" class="pwd-toggle" (click)="showPwd.update(v => !v)">
            {{ showPwd() ? '🙈' : '👁️' }}
          </button>
        </div>
      </div>

      @if (error()) {
        <div class="error-msg">{{ error() }}</div>
      }

      <button class="btn btn-primary w-full" type="submit" [disabled]="loading()">
        @if (loading()) { <span class="spinner"></span> }
        {{ loading() ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>

    <div class="login-footer">
      <a routerLink="/auth/alterador">Precisa alterar senha ou e-mail?</a>
    </div>
  </div>

  <div class="login-bg-pattern"></div>
</div>
