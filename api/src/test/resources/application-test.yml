de:
  flapdoodle:
    mongodb:
      embedded:
        version: 6.0.6
spring:
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=30m
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: jdbc:h2:mem:conecta_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: none
      defer-datasource-initialization: true
    show-sql: false

  flyway:
    locations: classpath:db/migration

  data:
    mongodb:
      auto-index-creation: true
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration



api:
  security:
    token:
      secret: "uma-secret-muito-longa-e-segura-para-os-testes-de-integracao-123"

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: conecta-api