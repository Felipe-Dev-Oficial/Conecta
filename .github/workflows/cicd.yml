name: Conecta Workflow

on:
  push:
    branches: [ "main", "app" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Build and Test Backend
        working-directory: ./api
        run: mvn -B test -Dspring.profiles.active=test

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./ui/package-lock.json
      - name: Install and Build Frontend
        working-directory: ./ui
        run: |
          npm install
          npm run build -- --configuration=production

  build-and-push:
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: henriquearthur
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: henriquearthur/conecta-api:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./ui
          push: true
          tags: henriquearthur/conecta-ui:latest

  deploy:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            cd ~/Conecta
            
            sudo git fetch origin main
            sudo git reset --hard origin/main
            
            sudo docker compose down
            sudo docker rmi henriquearthur/conecta-api:latest henriquearthur/conecta-ui:latest || true
            sudo docker compose pull
            sudo docker compose up -d
            sudo docker image prune -f